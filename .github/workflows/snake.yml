name: generate animation

on:
  # run automatically every 24 hours
  schedule:
    - cron: "0 */12 * * *" 
  
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the main branch
  push:
    branches:
    - main
    
jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # generates a snake game from a github user (<github_user_name>) contributions graph, output a svg animation at <svg_out_path>
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: dreamtraveller1314
          outputs: |
            dist/github-snake.svg?color_snake=#FF69B4&color_dots=#FFF0F5,#FFB6C1,#FF69B4,#FF1493,#C71585
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#FF69B4&color_dots=#30122e,#702058,#9d357a,#c94da1,#f066cc
            dist/ocean.gif?color_snake=#FF1493&color_dots=#FFF0F5,#FFB6C1,#FF69B4,#FF1493,#C71585&color_background=#1a1a1a

      # push the content of <build_dir> to a branch
      # the content will be available at https://raw.githubusercontent.com<github_user>/<repository>/<target_branch>/<file> , or as github page
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
